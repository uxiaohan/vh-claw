name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (Windows)
        run: bun run build:win

      - name: Package artifacts
        shell: pwsh
        run: |
          # 找到 tar.zst 文件
          $zst = Get-ChildItem -Path "build/" -Filter "*.tar.zst" -Recurse | Select-Object -First 1
          if ($zst) {
            # 创建临时解压目录
            $extractDir = "win-extract"
            New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
            
            # 使用 tar 解压 .tar.zst 文件
            tar -xf $zst.FullName -C $extractDir

            # 复制启动脚本到 U 盘根目录（extractDir 下的第一级目录）
            $appDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
            if ($appDir) {
              Copy-Item "resources/Windows启动.bat" -Destination "$($appDir.FullName)\Windows启动.bat" -Force
            }
            
            # 将解压后的文件打包成 zip
            Compress-Archive -Path "$extractDir\*" -DestinationPath "vh-claw-${{ github.event.inputs.version }}-windows-x64.zip" -Force
            
            # 清理临时目录
            Remove-Item -Recurse -Force $extractDir
          } else {
            Write-Error "tar.zst file not found!"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vh-claw-windows
          path: vh-claw-${{ github.event.inputs.version }}-windows-x64.zip
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (macOS)
        run: bun run build:mac

      - name: Package installer
        run: |
          # 找 tar.zst 解压，fallback 直接找 .app
          TARZST=$(find build/ -name "*.tar.zst" | head -1)
          if [ -n "$TARZST" ]; then
            mkdir -p mac-extract
            tar -xf "$TARZST" -C mac-extract
            xattr -cr mac-extract/ || true
            APP=$(find mac-extract/ -name "*.app" -maxdepth 5 | head -1)
            [ -z "$APP" ] && APP="mac-extract"
          else
            APP=$(find build/ -name "*.app" -maxdepth 5 | head -1)
            [ -z "$APP" ] && APP="build"
            xattr -cr "$APP" || true
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" "vh-claw-${{ github.event.inputs.version }}-macos-arm64.zip"
          [ -d "mac-extract" ] && rm -rf mac-extract || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vh-claw-macos
          path: vh-claw-${{ github.event.inputs.version }}-macos-arm64.zip
          if-no-files-found: warn

  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "VH-Claw ${{ github.event.inputs.version }}"
          body: |
            ## VH-Claw ${{ github.event.inputs.version }}

            便携式 OpenClaw 管理工具，无需配置，开箱即用。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `vh-claw-*-windows-x64.zip` | 解压后双击 `Windows启动.bat` 运行，首次运行需联网下载运行时 |
            | macOS arm64 | `vh-claw-*-macos-arm64.zip` | 解压后将 .app 拖入 U 盘，双击启动 |
          draft: false
          prerelease: false
          files: artifacts/**/*
