name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

env:
  OPENCLAW_VERSION: "2026.4.2"
  BUN_REGISTRY: "https://mirrors.huaweicloud.com/repository/npm/"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (Windows)
        run: bun run build:win

      - name: Pre-install OpenClaw & Package
        shell: pwsh
        run: |
          $zst = Get-ChildItem -Path "build/" -Filter "*.tar.zst" -Recurse | Select-Object -First 1
          if (-not $zst) { Write-Error "tar.zst not found"; exit 1 }

          $extractDir = "win-extract"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xf $zst.FullName -C $extractDir

          # 找到 bun.exe
          $bunExe = Get-ChildItem -Path $extractDir -Filter "bun.exe" -Recurse | Select-Object -First 1
          if (-not $bunExe) { Write-Error "bun.exe not found"; exit 1 }

          $openclawDir = Join-Path $bunExe.DirectoryName "data\openclaw"
          New-Item -ItemType Directory -Force -Path $openclawDir | Out-Null

          # 写入 package.json
          $pkg = @"
          {
            "name": "openclaw-runtime",
            "version": "1.0.0",
            "dependencies": {
              "openclaw": "${{ env.OPENCLAW_VERSION }}",
              "@slack/web-api": "latest",
              "@slack/bolt": "latest",
              "@larksuiteoapi/node-sdk": "latest",
              "@zed-industries/codex-acp": "^0.11.1",
              "@tencent-weixin/openclaw-weixin": "latest"
            }
          }
          "@
          Set-Content -Path "$openclawDir\package.json" -Value $pkg.Trim()

          # 写入 bunfig.toml
          Set-Content -Path "$openclawDir\bunfig.toml" -Value "[install]`nregistry = `"${{ env.BUN_REGISTRY }}`""

          # 运行 bun install
          & $bunExe.FullName install --no-progress --cwd $openclawDir
          if ($LASTEXITCODE -ne 0) { Write-Error "bun install failed"; exit 1 }
          Write-Host "OpenClaw pre-installed"

          # 复制启动脚本
          $appDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
          if ($appDir) {
            Copy-Item "resources/Windows启动.bat" -Destination "$($appDir.FullName)\Windows启动.bat" -Force
          }

          # 打包
          Compress-Archive -Path "$extractDir\*" -DestinationPath "vh-claw-${{ github.event.inputs.version }}-windows-x64.zip" -Force
          Remove-Item -Recurse -Force $extractDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vh-claw-windows
          path: vh-claw-${{ github.event.inputs.version }}-windows-x64.zip
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (macOS)
        run: bun run build:mac

      - name: Pre-install OpenClaw & Package
        run: |
          TARZST=$(find build/ -name "*.tar.zst" | head -1)
          if [ -z "$TARZST" ]; then echo "tar.zst not found"; exit 1; fi

          mkdir -p mac-extract
          tar -xf "$TARZST" -C mac-extract

          BUN_BIN=$(find mac-extract/ -name "bun" -type f | head -1)
          if [ -z "$BUN_BIN" ]; then echo "bun not found"; exit 1; fi
          chmod +x "$BUN_BIN"

          OPENCLAW_DIR="$(dirname "$BUN_BIN")/data/openclaw"
          mkdir -p "$OPENCLAW_DIR"

          # 写入 package.json（用 printf 避免 YAML heredoc 缩进问题）
          printf '{\n  "name": "openclaw-runtime",\n  "version": "1.0.0",\n  "dependencies": {\n    "openclaw": "%s",\n    "@slack/web-api": "latest",\n    "@slack/bolt": "latest",\n    "@larksuiteoapi/node-sdk": "latest",\n    "@zed-industries/codex-acp": "^0.11.1",\n    "@tencent-weixin/openclaw-weixin": "latest"\n  }\n}\n' "${{ env.OPENCLAW_VERSION }}" > "$OPENCLAW_DIR/package.json"

          # 写入 bunfig.toml
          printf '[install]\nregistry = "%s"\n' "${{ env.BUN_REGISTRY }}" > "$OPENCLAW_DIR/bunfig.toml"

          # 运行 bun install
          "$BUN_BIN" install --no-progress --cwd "$OPENCLAW_DIR"
          echo "OpenClaw pre-installed"

          # 去除隔离属性并打包
          xattr -cr mac-extract/ || true
          APP=$(find mac-extract/ -name "*.app" -maxdepth 5 | head -1)
          [ -z "$APP" ] && APP="mac-extract"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "vh-claw-${{ github.event.inputs.version }}-macos-arm64.zip"
          rm -rf mac-extract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vh-claw-macos
          path: vh-claw-${{ github.event.inputs.version }}-macos-arm64.zip
          if-no-files-found: warn

  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "VH-Claw ${{ github.event.inputs.version }}"
          body: |
            ## VH-Claw ${{ github.event.inputs.version }}

            便携式 OpenClaw 管理工具，无需配置，开箱即用。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `vh-claw-*-windows-x64.zip` | 解压后双击 `Windows启动.bat` 运行 |
            | macOS arm64 | `vh-claw-*-macos-arm64.zip` | 解压后将 .app 拖入 U 盘，双击启动 |
          draft: false
          prerelease: false
          files: artifacts/**/*
